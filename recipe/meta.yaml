{% set name = "insarhub" %}
{% set version = "0.2.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/i/insarhub/insarhub-{{ version }}.tar.gz
  sha256: dbc754ecf6174aaec474a042e604112001ea72ea9e4abba4e6c1a6e951c5d42d

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python
  entry_points:
    - insarhub = insarhub.cli.main:main
    - insarhub-app = insarhub.app.main:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - gdal >=3.8
    - mintpy
    - asf_search
    - cdsapi
    - colorama
    - contextily
    - dem_stitcher
    - hyp3_sdk
    - openpyxl
    - python-multipart
    - fastapi
    - pysolid
    - pygrib
    - uvicorn
    - rasterio >=1.4
    - sentineleof
    - numpy <2.0
    - imagecodecs <=2026.1.1
    

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - insarhub
  commands:
    - pip check
    - insarhub --version
    - insarhub-app --version
about:
  home: https://github.com/jldz9/InSARHub
  license: MIT
  license_file: LICENSE
  summary: "A modular Python framework for automated InSAR and time-series processing."
  doc_url: https://jldz9.github.io/InSARHub/


extra:
  recipe-maintainers:
    - jldz9
