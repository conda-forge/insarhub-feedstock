{% set name = "insarhub" %}
{% set version = "0.1.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jldz9/InSARHub/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f1381a604a77e0a7a7431d7ee75669f0e575d7e8df8fdf2478e80629d7625413

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python
  entry_points:
    - insarhub = insarhub.cli.main:main
    - insarhub-app = insarhub.app.main:serve

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }}
    - gdal >=3.8
    - mintpy
    - asf_search
    - cdsapi
    - colorama
    - contextily
    - dem_stitcher
    - hyp3_sdk
    - panel >=1.4
    - rasterio >=1.4
    - sentineleof
    - numpy >=2.0
    - imagecodecs <=2026.1.1

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - insarhub
  commands:
    - pip check
    - insarhub --version

about:
  home: https://github.com/jldz9/InSARHub
  license: MIT
  license_file: LICENSE
  summary: "A modular Python framework for automated InSAR and time-series processing."
  doc_url: https://jldz9.github.io/InSARHub/


extra:
  recipe-maintainers:
    - jldz9
